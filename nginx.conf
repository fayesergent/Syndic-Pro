server {
    listen 80;
    server_name _;

    # Racine des fichiers statiques compilés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # ── Routing SPA ────────────────────────────────────────────
    # try_files : cherche le fichier exact → dossier → index.html
    # Indispensable pour que le rechargement de page ne renvoie pas 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache immutable pour les assets Vite ───────────────────
    # Vite génère des noms de fichiers avec hash (ex: index-B3kQ2.js)
    # Ces fichiers ne changent jamais → cache 1 an
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Compression Gzip ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # ── Sécurité minimale ──────────────────────────────────────
    # Masquer la version nginx dans les headers
    server_tokens off;

    # Headers de sécurité
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
